<script>
// ===== 行业基准 =====
const IND={semicon:{n:"半导体",pe:[20,35],ps:[5,12],pb:[3,6],gm:[0.45,0.65]},internet:{n:"互联网",pe:[25,50],ps:[4,10],pb:[4,12],gm:[0.50,0.80]},saas:{n:"SaaS",pe:[30,80],ps:[6,15],pb:[5,15],gm:[0.65,0.85]},consumer:{n:"消费",pe:[15,30],ps:[1,4],pb:[2,5],gm:[0.30,0.50]},finance:{n:"金融",pe:[8,15],ps:[2,6],pb:[0.8,2],gm:[0.20,0.45]},health:{n:"医疗",pe:[15,35],ps:[3,8],pb:[3,7],gm:[0.50,0.75]},energy:{n:"能源",pe:[6,15],ps:[0.5,2],pb:[0.8,2.5],gm:[0.15,0.35]},auto:{n:"汽车",pe:[10,25],ps:[0.3,1.5],pb:[1,3],gm:[0.10,0.25]}};

const TY={
G:{n:"成长股",i:"🚀",d:"营收>15%·毛利率>40%·PS估值·PE在高速扩张期失效",f:"营收增速·毛利率·PS·Rule of 40·ROIC·加速度",x:"忽略股息率·静态PE·P/B",
 r:"增速放缓·毛利率下滑·估值透支",w:{rg:.30,gm:.15,ps:.15,r40:.15,roic:.10,pg:.10,nm:.05}},
V:{n:"价值股",i:"💰",d:"成熟期·折扣买入稳定现金流·PE家族多维对比",f:"PE家族·P/FCF·FCF Yield>5%·ROIC>15%·股息率>均值",x:"忽略营收增速·PS·毛利率",
 r:"价值陷阱·营收持续下滑·负债恶化",w:{pe:.20,fy:.20,roic:.15,dy:.15,dr:.10,nm:.10,pb:.05,pg:.05}},
C:{n:"周期股",i:"🔄",d:"低PE在顶部高PE在底部·PE失真·用EV/EBITDA",f:"EV/EBITDA·库存周期·商品价格·供给侧",x:"忽略PE·P/B·股息率·短期利润率",
 r:"周期下行·库存积压·需求拐点",w:{ev:.30,dr:.15,gm:.10,rg:.10,pg:.10,fy:.10,nm:.05,roic:.05,dy:.05}},
D:{n:"防御股",i:"🛡️",d:"经济衰退韧性·确定性溢价·估值≈债券",f:"股息率>2.5%·FCF稳定·利息覆盖>8x·盈利波动<5pp",x:"忽略营收增速·PS·利润增速",
 r:"利率上升损害吸引力·盈利下滑",w:{dy:.25,dr:.15,fy:.15,roe:.10,nm:.10,rg:.10,gm:.05,pb:.05,pg:.05}},
M:{n:"垄断股",i:"👑",d:"网络效应·品牌·技术壁垒·时间盟友·需垄断溢价",f:"毛利率稳定性·市场份额·提价能力·ROE>15%",x:"忽略PE·P/B·短期增速",
 r:"监管风险·技术颠覆·竞争加剧",w:{gm:.30,roe:.25,nm:.20,fy:.15,dr:.10}},
};

// ===== 5套筛子 =====
const SCR={
growth:{n:"🚀 成长筛选",d:"找增长最快且加速的公司",m:[
  ["收入增长 >15% YoY","营收增长","rg","rg>0.15"],
  ["盈利增长 >20% YoY","利润增长","pg","pg>0.20"],
  ["毛利率 >40%","毛利率","gm","gm>0.40"],
  ["ROIC >15%","ROIC","roic","roic>0.15"],
  ["Rule of 40 >40","利润率+增速","r40","(rg+nm)>0.40"],
  ["收入加速度(连2季提升)","加速度","ra","N/A"]],
  c:[["rg",">",0.15],["pg",">",0.20],["gm",">",0.40],["roic",">",0.15]]},
value:{n:"💰 价值筛选",d:"找被市场低估的公司",m:[
  ["PE < 行业中位数","PE","pe","pe>0&&pe<15"],
  ["FCF Yield >5%","FCF Yield","fy","fy>0.05"],
  ["P/B <1.5x","PB","pb","pb>0&&pb<1.5"],
  ["股息率 > 市场均值","股息率","dy","dy>0.02"],
  ["负债率 <50%","负债率","dr","dr<0.5"],
  ["ROIC >10%","ROIC","roic","roic>0.10"]],
  c:[["pe",">=0","<",15],["fy",">",0.05],["pb","<",1.5],["dy",">",0.02],["dr","<",0.5],["roic",">",0.1]]},
quality:{n:"🏆 质量筛选",d:"找长期稳定财务健康的公司",m:[
  ["ROE >15%","ROE","roe","roe>0.15"],
  ["负债率 <50%","负债率","dr","dr<0.5"],
  ["毛利率 >40%","毛利率","gm","gm>0.40"],
  ["净利率 >15%","净利率","nm","nm>0.15"],
  ["ROIC >15%","ROIC","roic","roic>0.15"],
  ["FCF/净利润 >50%","FCF转化率","fcfr","free_cf/net_income>0.5"]],
  c:[["roe",">",0.15],["dr","<",0.5],["gm",">",0.40],["nm",">",0.15],["roic",">",0.15]]},
short:{n:"⚠️ 排雷/做空筛选",d:"找恶化但市场未反应的公司",m:[
  ["营收 YoY下滑或放缓","营收趋势","rg","rg<0"],
  ["毛利率/利润率下降>2pp","利润率","gm","gm<0.35"],
  ["负债率 >65%","负债率","dr","dr>0.65"],
  ["净利率 <5%","净利率","nm","nm<0.05"],
  ["营收增长+利润率<0","Rule of 40","r40","(rg+nm)<0"],
  ["FCF为负","自由现金流","fcfr","free_cf<0"]],
  c:[["rg","<",0],["gm","<",0.35],["dr",">",0.65],["nm","<",0.05]]},
special:{n:"🎯 特殊事件",d:"特殊事件驱动机会",m:[
  ["新能源/AI转型","主题","theme",""],
  ["拆分/重组预期","重组","rest",""],
  ["管理层换血","管理层","mgmt",""],
  ["激进投资者介入","外部推动","act",""]],
  c:[]}};

function sw(i,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  el.classList.add("on");
  document.querySelectorAll(".c>div.hide,.c>div[id^=t]").forEach(d=>d.classList.add("hide"));
  document.getElementById("t"+i).classList.remove("hide");
  if(i===3) setTimeout(pfLoad,100); // 切到板块扫描时加载组合数据
}
function v(o){return o&&o.v!==undefined?o.v:o}
function fmt(n,u){if(n==null||n===undefined||isNaN(n))return"—";if(u==="%")return (n*100).toFixed(1)+"%";if(Math.abs(n)>=1e12)return (n/1e12).toFixed(2)+"T";if(Math.abs(n)>=1e9)return (n/1e9).toFixed(2)+"B";if(Math.abs(n)>=1e6)return (n/1e6).toFixed(2)+"M";return n.toFixed(2)}

// ===== 个股分析 =====
async function go(){
  const sym=document.getElementById("sym").value.trim().toUpperCase();
  if(!sym)return;const st=document.getElementById("st");st.textContent="⏳ 获取中...";
  document.getElementById("r").classList.add("hide");
  try{
    const r=await fetch("/api/stock/"+sym,{signal:AbortSignal.timeout(90000)});
    const j=await r.json();
    if(j.status!=="ok"){st.textContent=j.msg;return}
    render(j.data);st.textContent=`${j.data.name} @ $${fmt(v(j.data.price),"")}`;
  }catch(e){st.textContent="❌ "+e.message}
}

function render(d){
  document.getElementById("r").classList.remove("hide");
  // 清空步骤6-9旧内容，防止重复插入
  document.getElementById("steps69").innerHTML = "";
  // 提取报告期信息
  const _dates={};
  for(const k of Object.keys(d)){
    const item=d[k];
    if(item&&typeof item==='object'&&item.date&&item.date!=='今日'&&item.date!=='最新'){
      _dates[k]=item.date;
    }
  }
  const dd={rg:v(d.revenue_growth),gm:v(d.gross_margin),nm:v(d.net_margin),pg:v(d.profit_growth),pe:v(d.pe),ps:v(d.ps),pb:v(d.pb),fy:v(d.fcf_yield),ev:v(d.ev_ebitda),peg:v(d.peg),roic:v(d.roic),roe:v(d.roe),dr:v(d.debt_ratio),dy:v(d.dividend_yield),fm:v(d.fcf_margin),beta:v(d.beta),price:v(d.price),eps:v(d.eps),name:d.name,sec:d.sector||"",src:d.finance_source||"",fis:d.fiscal_year||"",pf:v(d.pe_forward),h52:v(d.high_52w),l52:v(d.low_52w),chg:v(d.change_pct),bv:v(d.book_value_per_share),roa:v(d.roa),cr:v(d.current_ratio),cash:v(d.cash_short_term),fcf:v(d.free_cf),ocf:v(d.operating_cf),capex:v(d.capex),rg_gr:v(d.receivables_growth),inv_gr:v(d.inventory_growth),
    pc:d.percentiles?.v, st:d.stability?.v, cy:d.cycle?.v, rk:d.risk?.v, adj:d.adjustments?.v, dq:d.data_quality?.v, rt:d.rating?.v,
    _dates:_dates};
  
  // ===== 数据质量横幅 v2（严重分级+影响评估）=====
  if(dd.dq){
    const dq=dd.dq;
    // 检查是否有严重缺失字段
    const hasCriticalMissing = dq.missing_severity && dq.missing_severity.critical && dq.missing_severity.critical.length > 0;
    const hasImportantMissing = dq.missing_severity && dq.missing_severity.important && dq.missing_severity.important.length > 0;
    const hasAnyMissing = dq.missing_fields && dq.missing_fields.length > 0;
    
    // 状态升级：有严重缺失或异常时，必选warning/error
    const effectiveStatus = hasCriticalMissing ? "error" : 
                            (hasImportantMissing && dq.status==="good") ? "warning" :
                            (dq.warnings&&dq.warnings.length) ? dq.status : dq.status;
    const ec = effectiveStatus==="good" ? "g" : effectiveStatus==="warning" ? "o" : "r";
    const icon = effectiveStatus==="good" ? "✅" : effectiveStatus==="warning" ? "⚠️" : "🔴";
    
    let dqHtml=`<div class="card" style="padding:6px 12px;border-left:4px solid ${ec==='g'?'#3fb950':ec==='o'?'#d29922':'#f85149'}">
      <div class="row" style="margin:0"><span style="font-size:13px">${icon} 数据健康 ${Math.round(dq.score)}分</span>
      <span class="s">${dq.fields_count}个字段 · ${dq.source||"westock"}</span>`;
    if(dq.warnings&&dq.warnings.length){
      dqHtml+=`<span class="s" style="color:#f85149">🔴 ${dq.warnings.length}个异常</span>`;
      dqHtml+=`</div><div style="margin-top:4px">`;
      for(const w of dq.warnings){
        dqHtml+=`<div style="font-size:11px;background:#2d1215;border:1px solid #f8514933;border-radius:4px;padding:3px 6px;margin:2px 0;color:#f85149">⚠️ <strong>${w.field}</strong>=${fmt(w.value)} — ${w.msg}</div>`;
      }
      dqHtml+=`</div>`;
    }else if(hasCriticalMissing){
      // 有严重缺失但没有warnings → 说明是缺失不是异常
      dqHtml+=`<span class="s" style="color:#f85149">🔴 ${hasAnyMissing?dq.missing_fields.length+'个字段缺失':''}</span></div>`;
    }else{
      dqHtml+=`<span class="s" style="color:${hasAnyMissing?'#d29922':'#3fb950'}">${hasAnyMissing?'⚠️ 部分字段缺失':'✅ 无异常'}</span></div>`;
    }
    
    // 缺失字段分级展示
    if(hasAnyMissing && dq.missing_severity){
      dqHtml+=`<div style="margin-top:4px">`;
      // critical
      if(dq.missing_severity.critical && dq.missing_severity.critical.length){
        dqHtml+=`<div style="font-size:11px;background:#2d1215;border:1px solid #f8514966;border-radius:4px;padding:4px 6px;margin:2px 0">
          <span style="color:#f85149;font-weight:600">🔴 严重缺失：</span>
          <span style="color:#f85149">${dq.missing_severity.critical.join('、')}</span>
          <div class="s" style="font-size:10px;color:#f8514988;margin-top:2px">⚠ 这些字段是分析的根基，缺失将导致核心模块不可用</div>
        </div>`;
      }
      // important
      if(dq.missing_severity.important && dq.missing_severity.important.length){
        dqHtml+=`<div style="font-size:11px;background:#1a1d2d;border:1px solid #d2992244;border-radius:4px;padding:4px 6px;margin:2px 0">

// ===== 价格目标计算 v8.1 — 优化版（连续平滑+因子合并+范围收窄）=====
// clamp工具函数
function clamp(x,lo,hi){return Math.max(lo,Math.min(hi,x));}

// 因子1: 综合质量因子（合并质量+现金流+稳定性，连续评分）
function calcQualityComposite(d,cl){
  const gm=v(d.gm)||0, nm=v(d.nm)||0, roe=v(d.roe)||0, roic=v(d.roic)||0, fy=v(d.fy)||0;
  // 连续评分（clamp到0-1）
  const gmScore=clamp(gm/0.70,0,1);
  const nmScore=clamp(nm/0.25,0,1);
  const roeScore=clamp(roe/0.25,0,1);
  const roicScore=clamp(roic/0.20,0,1);
  const fyScore=clamp(fy/0.08,0,1);
  let stabilityScore=0.5;
  if(d.st&&d.st.score)stabilityScore=clamp(d.st.score/100,0,1);
  const composite=0.25*gmScore+0.20*nmScore+0.20*roeScore+0.15*roicScore+0.10*fyScore+0.10*stabilityScore;
  return {factor:0.7+composite*0.6, composite, gm, nm, roe, roic, fy};
}

// 因子2: 增长因子（平滑版，范围收窄到0.75-1.25）
function calcGrowthFactor(d,cl){
  const rg=v(d.rg)||0, pg=v(d.pg)||0;
  let gScore=0.5;
  if(cl==='G')gScore=clamp(rg/0.40,0,1);
  else if(cl==='M')gScore=clamp(rg/0.25,0,1);
  else if(cl==='V')gScore=clamp(rg/0.15,0,1);
  else if(cl==='C')gScore=1-clamp(rg/0.40,0,1); // 反向
  else gScore=clamp(rg/0.10,0,1);
  // 利润质量修正
  if(rg>0){if(pg>rg*1.2)gScore*=1.05;if(pg<rg*0.5)gScore*=0.90;}
  return {factor:0.75+clamp(gScore,0,1)*0.5, rg, pg, reverse:cl==='C'};
}

// 因子3: 估值因子（收窄范围0.7-1.3）
function calcValuationFactor(d){
  const pc=d.pc||{};
  const pePct=pc.pe?.pct||50;
  const score=1-pePct/100;
  return {factor:0.7+score*0.6, pePct};
}

// 因子4: 周期因子（收窄范围）
function calcCycleFactor(d,cl){
  if(cl!=='C')return{factor:1.0,position:'N/A'};
  if(!d.cy)return{factor:1.0,position:'未知'};
  const po=d.cy.position||'';
  if(po.includes('顶部'))return{factor:0.6,position:'顶部'};
  if(po.includes('下降'))return{factor:0.8,position:'下降'};
  if(po.includes('上升'))return{factor:1.2,position:'上升'};
  if(po.includes('底部'))return{factor:1.3,position:'底部'};
  return{factor:1.0,position:'中性'};
}

// 因子5: 杠杆因子
function calcLeverageFactor(d){
  const dr=v(d.dr)||0;
  if(dr>0.80)return{factor:0.70,dr,rating:'极高'};
  if(dr>0.65)return{factor:0.85,dr,rating:'高'};
  if(dr>0.50)return{factor:0.95,dr,rating:'偏高'};
  if(dr<0.30)return{factor:1.05,dr,rating:'低'};
  return{factor:1.00,dr,rating:'中'};
}

// 主函数：综合质量+增长+估值+周期+杠杆 → μ → 对数正态分布
function getPriceTarget(d,cl,typeStrength){
  const p=d.price;
  if(!p||p<=0)return null;
  // 1. 五因子
  const quality=calcQualityComposite(d,cl);
  const growth=calcGrowthFactor(d,cl);
  const valuation=calcValuationFactor(d);
  const cycle=calcCycleFactor(d,cl);
  const leverage=calcLeverageFactor(d);
  // 2. 基准μ
  let baseMu={G:0.20,V:0.10,C:0.08,D:0.05,M:0.12}[cl]||0.10;
  // ★ v7.3: 分类强度调优μ_base
  // typeStrength∈[0,1], 强度0.5→基线, 强度1.0→+20%, 强度0→-20%
  if(typeStrength!==undefined){
    baseMu*=clamp(0.8+0.4*typeStrength,0.6,1.2);
  }
  // 3. 综合μ
  let mu=baseMu*quality.factor*growth.factor*valuation.factor*cycle.factor*leverage.factor;
  mu=clamp(mu,-0.25,0.45);
  // 4. 波动率σ（类型调整+周期位置修正）
  let s=0.30;
  if(d.rk&&d.rk.vol)s=d.rk.vol;
  else if(d.h52&&d.l52&&d.l52>0)s=Math.log(d.h52/d.l52)/4;
  if(cl==='G')s*=1.15;if(cl==='C')s*=1.30;if(cl==='D')s*=0.70;
  // ★ v7.3: 周期位置σ修正
  if(d.cy){
    const pos=d.cy.position||"";
    if(pos.includes("顶部"))s*=1.15;
    else if(pos.includes("底部"))s*=0.85;
  }
  s=clamp(s,0.15,0.70);
  // 5. 对数正态分布
  const r={};
  for(const{k,t}of[{k:'p1',t:1/12},{k:'p3',t:3/12},{k:'p6',t:6/12},{k:'p12',t:1}]){
    const drift=(mu-0.5*s*s)*t, diff=s*Math.sqrt(t);
    r[k]={m:p*Math.exp(drift),l65:p*Math.exp(drift-0.935*diff),h65:p*Math.exp(drift+0.935*diff),l95:p*Math.exp(drift-1.96*diff),h95:p*Math.exp(drift+1.96*diff)};
  }
  // 6. 元数据
  r._s=s;r._mu=mu;r._baseMu=baseMu;
  r._q=quality.factor;r._gf=growth.factor;r._vf=valuation.factor;r._cf=cycle.factor;r._lf=leverage.factor;
  r._factors={quality,growth,valuation,cycle,leverage};
  return r;
}// ===== 买卖建议引擎 v7.0 — Kelly仓位管理 + 技术面赔率修正 =====
// 升级：固定风险仓位→Kelly下注引擎 + 技术面因子调整 + 波动率止损
function recommend(d,cl,score,pT,p){
  const rg=v(d.rg)||0,gm=v(d.gm)||0,nm=v(d.nm)||0,pe=v(d.pe)||0,ps=v(d.ps)||0;
  const fy=v(d.fy)||0,dr=v(d.dr)||0,roe=v(d.roe)||0,roic=v(d.roic)||0;
  const h52=v(d.h52)||p,l52=v(d.l52)||p*0.7;
  const vol=1-(l52/h52); // 波动率估计
  const rk=d.rk||{};
  const cy=d.cy||{};
  const st=d.st||{};
  const pc=d.pc||{};
  
  // 1. 估值风险: 当前价在95%置信区间中的位置 (0=接近上限安全, 1=接近下限危险)
  const p12low=pT.p12.l95;
  const p12mid=pT.p12.m;
  const p12high=pT.p12.h95;
  const valRange=p12high-p12low;
  const valuationRisk=valRange>0?Math.max(0,Math.min(1,(p12high-p)/valRange)):0.5;
  
  // 2. 基本面风险: 基于评分和利润质量
  let fundRisk=Math.max(0,Math.min(1,1-(score/100)*0.8-(roic>0.15?0.05:0)-(roe>0.15?0.05:0)));
  // ★ v7.3: 稳定性修正基本面风险
  if(d.st&&d.st.score!==undefined){
    if(d.st.score<30)fundRisk=Math.min(1,fundRisk+0.20);
    else if(d.st.score<50)fundRisk=Math.min(1,fundRisk+0.10);
  }
  
  // 3. 周期风险
  let cycleRisk=0.10;
  if(cy){
    const pos=cy.position||"";
    if(pos.includes("顶部"))cycleRisk=0.35;
    else if(pos.includes("下降"))cycleRisk=0.25;
    else if(pos.includes("底部"))cycleRisk=0.05;
    else cycleRisk=0.10;
  }
  
  // 4. 市场风险（基于波动率）
  let marketRisk=0.05;
  if(vol>0.50)marketRisk=0.25;
  else if(vol>0.35)marketRisk=0.15;
  
  // 综合风险概率（加权）
  let riskProb=0.35*valuationRisk+0.30*fundRisk+0.20*cycleRisk+0.15*marketRisk;
  riskProb=Math.max(0.05,Math.min(0.85,riskProb));
  
  // 5. 安全边际（基于保守的中位值）
  const mos=(p12mid-p)/p;
  
  // ===== v7.1 修正: 收益风险比(空间vs空间) =====
  // 上行 = 12月65%置信上限(中等看涨), 下行 = 当前到95%下限的跌幅
  const upside=(pT.p12.h65-p)/p;
  const downsideMagnitude=Math.max(0,(p-p12low)/p);  // 下行幅度(真实跌幅空间)
  const rr=downsideMagnitude>0.01?upside/downsideMagnitude:99;  // 空间对比空间
  
  // ★ v7.2 修正: winProb用综合riskProb而非仅valuationRisk
  // 旧版: winProb=1-valuationRisk → 与决策层riskProb不一致,
  // 导致"买入"建议与"0%仓位"自相矛盾
  const winProb=1-riskProb;  // 综合风险概率(4因子加权),与决策层对齐
  const b=rr;
  const kellyRaw=b>0?(b*winProb-(1-winProb))/b:0;
  const halfKelly=Math.max(0,kellyRaw*0.5);  // 半凯利（保守）
  
  // 7. 技术面赔率修正因子（52周位置作为代理）
  const relPos=(p-l52)/(h52-l52);
  let techFactor=0;
  if(relPos<0.10)techFactor=0.25;     // 极度超卖→赔率大幅改善
  else if(relPos<0.25)techFactor=0.15;// 超卖→改善
  else if(relPos>0.90)techFactor=-0.15;// 极度超买→赔率恶化
  else if(relPos>0.75)techFactor=-0.05;// 超买→略恶化
  if(cy&&cy.position&&cy.position.includes("底部"))techFactor=Math.max(techFactor,0.20);
  
  // 最终仓位 = Kelly × (1 + techFactor), 限制max 25%
  const finalKelly=halfKelly*(1+techFactor);
  const posPct=Math.round(Math.min(finalKelly,0.25)*100);
  
  // 8. 赔率质量评分 (Edge Score)
  const edgeScore=b*winProb-(1-winProb);
  
  // 9. 三阶段建仓模型
  let stage="";
  if(posPct>=15)stage="加注阶段";
  else if(posPct>=8)stage="标准建仓";
  else if(posPct>0)stage="试探建仓";
  
  // 10. 决策等级（v7.1: 去掉rr强约束, 用风险结构+空间+评分）
  let action,conf,actionColor;
  if(riskProb<0.25&&upside>0.40&&score>=70){action="强烈买入";conf=85;actionColor="#1a7f37";}
  else if(riskProb<0.40&&upside>0.20&&score>=60){action="买入";conf=70;actionColor="#2ea043";}
  else if(riskProb<0.50&&upside>0.10&&score>=50){action="试探买入";conf=60;actionColor="#2ea043";}
  else if(riskProb<0.60){action="观望";conf=55;actionColor="#d29922";}
  else if(riskProb<0.75){action="减仓";conf=65;actionColor="#f0883e";}
  else{action="卖出";conf=80;actionColor="#f85149";}
  
  // 特殊情况覆盖
  if(cl==='C'&&cy&&(cy.position||"").includes("顶部")){action="卖出";conf=90;actionColor="#f85149";}
  if(riskProb>0.5&&(action==="强烈买入"||action==="买入")){action="观望";conf=55;actionColor="#d29922";}
  if(score<50&&(action==="强烈买入"||action==="买入")){action="观望";conf=50;actionColor="#d29922";}
  
  // ★ v7.2 一致性兜底: 决策与仓位不自相矛盾
  // 如果决策说可以买,但Kelly算出0%,说明模型有冲突
  // → 兜底: 至少给一个试探仓位(5%),但标记为"谨慎"
  if((action==="强烈买入"||action==="买入") && posPct===0){
    posPct=5;  // 最小试探仓位
    stage="试探建仓(兜底)";
  }
  // 反过来: 决策说"观望/减仓/卖出"但Kelly算出正仓位→仓位强制归零
  if((action==="减仓"||action==="卖出") && posPct>0){
    posPct=0;
    stage="不持仓(兜底)";
  }
  if(action==="观望" && posPct>10){
    posPct=5;  // 观望期最多5%轻仓
    stage="轻仓观望(兜底)";
  }
  
  // 仓位文字描述（升级版）
  const posAdvice=posPct>=20?"重仓(20-25%)":posPct>=15?"大仓位(15-20%)":posPct>=10?"标准仓位(10-15%)":posPct>=5?"小仓试探(5-10%)":posPct>0?"极轻仓(≤5%)":"不持仓";
  
  // 11. 波动率止损（v7.0升级: 1.5σ√0.5年 + 52周低点保护）
  const sigma=Math.max(vol,0.15);
  const stopLoss=Math.max(p*Math.exp(-1.5*sigma*Math.sqrt(0.5)),l52*1.02);
  const tp1=pT.p6.m;
  const tp2=pT.p12.m;
  const p12h95=pT.p12.h95;
  const slPct=(p-stopLoss)/p;
  const tp1Pct=(tp1-p)/p;
  const tp2Pct=(tp2-p)/p;
  
  // 12. 关键风险（保留+新增技术面风险）
  const risks=[];
  if(valuationRisk>0.70)risks.push({t:"估值风险",l:"高",d:`当前价位于置信区间上${(valuationRisk*100).toFixed(0)}%分位,估值偏高`});
  else if(valuationRisk>0.40)risks.push({t:"估值风险",l:"中",d:`当前价位于置信区间中位偏上,估值合理偏高`});
  if(dr>0.65)risks.push({t:"财务风险",l:"高",d:`负债率${(dr*100).toFixed(0)}%,偿债压力大`});
  if(cl==='G'&&rg<0.15&&rg>0)risks.push({t:"增长放缓",l:"高",d:`营收增速${(rg*100).toFixed(0)}%,低于成长标准`});
  if(cl==='G'&&(rg<0||rg===0))risks.push({t:"增长停滞",l:"极高",d:`营收零增长/下滑${(rg*100).toFixed(0)}%,成长逻辑破裂`});
  if(cl==='C'&&cy&&(cy.position||"").includes("顶部"))risks.push({t:"周期顶部",l:"极高",d:"PE陷阱,盈利可能大幅下滑"});
  if(cl==='C'&&cy&&(cy.position||"").includes("底部"))risks.push({t:"周期底部",l:"低",d:"但复苏时间不确定"});
  if(fy<0)risks.push({t:"现金流风险",l:"中",d:"FCF为负,利润质量需关注"});
  if(vol>0.50)risks.push({t:"高波动",l:"中",d:`波动率${(vol*100).toFixed(0)}%,价格波动大`});
  if(d.ocf&&d.net_income&&d.net_income>0){const cc=d.ocf/d.net_income;if(cc<0.7)risks.push({t:"现金转换",l:"中",d:`现金转换率${(cc*100).toFixed(0)}%,利润质量偏低`});}
  if(relPos>0.85)risks.push({t:"技术超买",l:"中",d:`52周高位(${(relPos*100).toFixed(0)}%),追高风险大`});
  if(relPos<0.15&&cl!=='V')risks.push({t:"技术超卖(机会)",l:"低",d:`52周低位(${(relPos*100).toFixed(0)}%),关注反转信号`});
  
  return{
    action,conf,actionColor,riskProb:Math.round(riskProb*100),mos:mos*100,rr,
    valuationRisk:Math.round(valuationRisk*100),fundRisk:Math.round(fundRisk*100),
    cycleRisk:Math.round(cycleRisk*100),marketRisk:Math.round(marketRisk*100),
    score:Math.round(score),
    // v7.1 字段
    posPct,posAdvice:posPct>0?stage:"不持仓",stage,
    kellyRaw:Math.round(kellyRaw*1000)/10,
    halfKelly:Math.round(halfKelly*1000)/10,
    techFactor:Math.round(techFactor*100),
    edgeScore:Math.round(edgeScore*1000)/10,
    finalKelly:Math.round(finalKelly*1000)/10,
    relPos:Math.round(relPos*100),
    // 止损止盈
    stopLoss,stopLossPct:slPct*100,
    tp1,tp1Pct:tp1Pct*100,tp2,tp2Pct:tp2Pct*100,
    // v7.1 修正: upside=12月上行动态, downside=下行幅度
    upside:upside*100,downside:downsideMagnitude*100,
    risks,vol,p12low,p12mid,p12h95
  };
}

function cls(d){
  const sl={};for(let k in TY)sl[k]=0;
  const dt={};for(let k in TY)dt[k]=[];
  const maxPts={G:16,V:14,C:11,D:9,M:9};
  function addPt(t,label,hit,pts){if(hit)sl[t]+=pts;dt[t].push({label,hit,pts:hit?pts:0});}
  const v_=(x)=>isNaN(v(x))?0:v(x);
  const rg=v_(d.rg),gm=v_(d.gm),nm=v_(d.nm),pg=v_(d.pg);
  const pe=v_(d.pe),ps=v_(d.ps),pb=v_(d.pb),fy=v_(d.fy);
  const ev=v_(d.ev),roic=v_(d.roic),roe=v_(d.roe);
  const dr=v_(d.dr),dy=v_(d.dy),fm=v_(d.fm);
  const beta=v_(d.beta), sec=(d.sec||"").toLowerCase();
  // 行业分位数据
  const pc=d.pc||{};
  const pct=(k,def=50)=>{const p=pc[k];return p?p.pct:def;};
  const rgPct=pct("revenue_growth"),gmPct=pct("gross_margin");
  const nmPct=pct("net_margin"),roePct=pct("roe");
  const roicPct=pct("roic"),pePct=pct("pe"),psPct=pct("ps");
  const pbPct=pc.pb?.pct??50;
  const fyPct=pc.fcf_yield?.pct??50;
  const isProfitable = nm > 0 || roe > 0;
  // ========================
  // 🚀 成长(G) — 行业相对
  // ========================
  addPt('G','营收行业分位>60%',rgPct>60,3);
  addPt('G','营收行业分位>80%',rgPct>80,3);
  addPt('G','毛利行业分位>60%',gmPct>60,2);
  addPt('G','利润增长>20%',pg>0.20,2);
  addPt('G','PS行业分位<60%',psPct<60,1);
  addPt('G','ROIC行业分位>60%',roicPct>60,2);
  addPt('G','Rule of 40>40',rg+fm>0.40,3);
  // ========================
  // 💰 价值(V) — 行业相对
  // ========================
  addPt('V','PE行业分位<40%',pePct<40,3);
  addPt('V','PB行业分位<40%',pbPct<40,2);
  addPt('V','FCF Yield行业分位>60%',fyPct>60,3);
  addPt('V','ROIC行业分位>60%',roicPct>60,2);
  addPt('V','股息率>2%',dy>0.02,2);
  addPt('V','负债率<40%',dr<0.4,2);
  // ========================
  // 🔄 周期(C) — 结构判断
  // ========================
  addPt('C','EV/EBITDA>0(基线)',ev>0,1);
  addPt('C','低PE分位<30%+低增',pePct<30&&rgPct<50,3);
  addPt('C','高负债>45%',dr>0.45,2);
  addPt('C','高PE分位>70%+亏损',pePct>70&&nm<0,3);
  addPt('C','高PS分位>70%+低毛利',psPct>70&&gmPct<40,2);
  // ========================
  // 🛡️ 防御(D) — v7.5 收紧版
  // ========================
  addPt('D','股息率>2.5%',dy>0.025,3);
  addPt('D','股息率>4%',dy>0.04,2);
  addPt('D','营收分位<30%+正利润+FCF>10%',rgPct<30&&isProfitable&&fm>0.10,2);
  addPt('D','低Beta<0.8+正利润+股息>2%',beta>0&&beta<0.8&&isProfitable&&dy>0.02,2);
  // ========================
  // 👑 垄断(M) — 行业相对
  // ========================
  addPt('M','毛利行业分位>75%',gmPct>75,3);
  addPt('M','ROE行业分位>75%',roePct>75,3);
  addPt('M','净利行业分位>75%',nmPct>75,2);
  addPt('M','负债率<35%',dr<0.35,1);
  // ========================
  // ★ v7.5: 行业前置过滤器 (B)
  // ========================
  const rawSlBefore={};for(let k in sl)rawSlBefore[k]=sl[k];
  const excludeTypes=[];
  if(sec.match(/semi|芯片|ai|tech|software|cloud|internet|电子|设备|device|hardware|网络/)){
    excludeTypes.push("D");  // 科技类→只排除防御，保留周期候选资格
  }else if(sec.match(/consumer.*defensive|consumer.*staples|食品|饮料|必需/)){
    excludeTypes.push("G","C");  // 纯消费防御→排除成长和周期
  }else if(sec.match(/utility|公用|电力|水务|gas.*utility/)){
    excludeTypes.push("G","C");  // 公用事业→排除成长和周期
  }else if(sec.match(/energy|oil|gas(?!.*utility)|chemical|能源|石油|化工|basic.material|material/)){
    excludeTypes.push("D");  // 能源→只排除防御，保留成长/价值/周期
  }else if(sec.match(/financial|bank|insurance|金融|银行|保险|fund/)){
    excludeTypes.push("G","D");  // 金融→排除成长和防御
  }
  for(const t of excludeTypes){ sl[t]=0; dt[t]=dt[t].map(c=>({...c,hit:false,pts:0})); }
  // 回退：如果过滤后全部归零，用原始分
  if(Object.values(sl).every(v=>v===0)){ excludeTypes.length=0; for(let k in sl)sl[k]=rawSlBefore[k]; }
  // ========================
  // ★ v7.5: 原始分决策 — 消除分母偏差
  // ========================
  const normalized={};for(let k in sl)normalized[k]=maxPts[k]>0?sl[k]/maxPts[k]:0;
  // 用原始分排序（不归一化）
  const srRaw=Object.entries(sl).sort((a,b)=>b[1]-a[1]);
  let pri=srRaw[0][0];const topRaw=srRaw[0][1],nextRaw=srRaw[1][1];
  // G-M 对抗：两者都强时优先G（成长+垄断双重属性，选更广泛的）
  if(pri==="M"&&sl["G"]>=6&&(topRaw-sl["G"])<=2)pri="G";
  // 平局/接近时按优先级: G > M > V > D > C
  else if((topRaw-nextRaw)<2){
    for(const o of["G","M","V","D","C"])if(sl[o]===topRaw){pri=o;break}
  }
  const top1=normalized[pri]||0;
  let conf=top1>0.55?"高":top1>0.30?"中":"低";
  const mixed=topRaw<3;  // 原始分<3 → 无可信条件
  return{pri,scores:Object.entries(sl),normalized,typeStrength:top1,conf,mixed,details:dt,excluded:excludeTypes};
}

function score(d,pk){
  const t=TY[pk],w=t.w;let pr=[],ts=0,tw=0;
  // 评分指标→API响应键名映射（用于查找报告期）
  const _k2api={rg:"revenue_growth",gm:"gross_margin",nm:"net_margin",pg:"profit_growth",
    pe:"pe",ps:"ps",pb:"pb",fy:"fcf_yield",ev:"ev_ebitda",roic:"roic",roe:"roe",
    dr:"debt_ratio",dy:"dividend_yield",fm:"fcf_margin"};
  for(const[k,n,w_]of[["rg","营收增长率",w.rg||0],["pg","利润增长率",w.pg||0],["gm","毛利率",w.gm||0],["nm","净利率",w.nm||0],["pe","PE",w.pe||0],["ps","PS",w.ps||0],["pb","PB",w.pb||0],["peg","PEG",w.peg||0],["fy","FCF Yield",w.fy||0],["ev","EV/EBITDA",w.ev_ebitda||w.ev||0],["roic","ROIC",w.roic||0],["roe","ROE",w.roe||0],["dr","负债率",w.dr||0],["dy","股息率",w.dy||0],["fm","FCF Margin",w.fm||0]]){
    let val=v(d[k]);if(val===undefined||isNaN(val)||w_===0)continue;
    const periodTag = d._dates && d._dates[_k2api[k]] ? "·"+d._dates[_k2api[k]] : "";
    const isGood=!["pe","pb","dr","ev"].includes(k);
    let sc;
    if(isGood){
      // 正向评分（对数缩放版）：低值区分度高
      const bm={rg:0.15,gm:0.40,nm:0.20,roic:0.15,roe:0.15,fy:0.03,dy:0.02}[k]||0.10;
      if(val<=0)sc=10;
      else if(val<bm)sc=30+40*(val/bm);
      else {
        const ratio=val/bm;
        sc=70+30*Math.log(1+(ratio-1)*2)/Math.log(5); // 对数缩放：5倍基准→100分
      }
    }else{
      // 反向评分（负PE修正）
      const bm={pe:25,pb:3,dr:0.40,ev:12}[k]||0.5;
      if(k==='pe'&&val<0){sc=10}  // 负PE（亏损）→低分
      else if(val<=0)sc=85;
      else if(val<=bm)sc=80-20*(val/bm);
      else sc=Math.max(5,60-40*Math.min((val/bm-1),2));
    }
    sc=Math.round(Math.min(100,Math.max(0,sc)));ts+=sc*w_/100;tw+=w_/100;
    pr.push({n,val:fmt(val,k==='pe'||k==='ps'||k==='pb'||k==='ev'?"x":k==='peg'?"":k==='dy'||k.startsWith("r")||k==='gm'||k==='nm'||k==='fy'||k==='fm'||k==='roe'||k==='dr'||k==='roic'?"%":""),sc,w:w_,period:periodTag});
  }
  
  // 利润质量调整
  let total=tw>0?Math.round(ts/tw):50;
  let qa="";
  
  // 1. 现金转换率 = 经营现金流 / 净利润
  if(d.ocf&&d.net_income&&d.net_income>0){
    const cashRatio=d.ocf/d.net_income;
    if(cashRatio<0.8){
      const penalty=Math.round((0.8-cashRatio)*15); // 最多扣~12分
      total-=penalty;
      qa+=`现金转换率${(cashRatio*100).toFixed(0)}%偏低，扣${penalty}分 `;
    }
  }
  
  // 2. 应收账款增速远超营收增速→塞货嫌疑
  if(d.rg_gr&&d.rg&&d.rg_gr>d.rg*1.5&&d.rg>0){
    total-=5;
    if(!qa)qa="";qa+=`应收增速(${(d.rg_gr*100).toFixed(0)}%)远超营收，扣5分 `;
  }
  
  if(qa)pr.push({n:"利润质量",val:qa,sc:0,w:0});
  
  // ★ v6.0 乘法调整因子（行业×稳定性×周期×风险）
  if(d.adj){
    const a=d.adj;
    let adjNote=[];
    if(a.industry&&a.industry!==1.0){const d_=Math.round((a.industry-1)*100);adjNote.push("行业"+d_+"%");pr.push({n:"行业分位",val:(d_>0?"+":"")+d_+"%",sc:d_,w:0});}
    if(a.stability&&a.stability!==1.0){const d_=Math.round((a.stability-1)*100);adjNote.push("稳定"+d_+"%");pr.push({n:"稳定性",val:(d_>0?"+":"")+d_+"%",sc:d_,w:0});}
    if(a.cycle&&a.cycle!==1.0){const d_=Math.round((a.cycle-1)*100);adjNote.push("周期"+d_+"%");pr.push({n:"周期调整",val:(d_>0?"+":"")+d_+"%",sc:d_,w:0});}
    if(a.risk&&a.risk!==1.0){const d_=Math.round((a.risk-1)*100);adjNote.push("风险"+d_+"%");pr.push({n:"风险折扣",val:d_+"%",sc:d_,w:0});}
    total=Math.round(total*a.industry*a.stability*a.cycle*a.risk);
  }
  
  return{total:Math.max(0,Math.min(100,total)),parts:pr};
}

// ===== 第二轮：5套量化筛选引擎 v7.3 =====
// 从个股API逐个获取 → 按条件评估 → 排序展示
const SCORE_WEIGHTS={
  growth:{rg:2,pg:2,gm:1.5,roic:1.5,r40:2,ra:1},
  value:{pe:2,fy:2,pb:1.5,dy:1.5,dr:1,roic:1},
  quality:{roe:2,dr:1.5,gm:1.5,nm:1.5,roic:1.5,fcfr:1},
  short:{rg:2,gm:2,dr:1.5,nm:1.5,r40:2,fcfr:1},
  special:{theme:2,rest:2,mgmt:2,act:2}
};

function _evalCriterion(key, op, threshold, val, op2){
  // 简单二元比较
  if(!op2){
    if(val===undefined||isNaN(val))return false;
    if(op===">")return val>threshold;
    if(op==="<")return val<threshold;
    if(op===">=")return val>=threshold;
    if(op==="<=")return val<=threshold;
    return false;
  }
  // 复合比较: [key, op1, op2, threshold] e.g. ["pe",">=","<",15] → pe>=0 && pe<15
  if(val===undefined||isNaN(val))return false;
  if(op===">="&&op2==="<")return val>=0&&val<threshold;
  if(op===">"&&op2==="<")return val>0&&val<threshold;
  return false;
}

function _scrScore(type, vals){
  // 根据类型和指标值计算0-100分的筛选评分
  const w=SCORE_WEIGHTS[type]||{};
  let total=0, weightSum=0;
  const checks={};
  const rules={
    growth:[
      ["rg",">",0.15,"营收增长>15%"],
      ["rg",">",0.30,"营收增长>30%(加分)"],
      ["pg",">",0.20,"利润增长>20%"],
      ["gm",">",0.40,"毛利率>40%"],
      ["roic",">",0.15,"ROIC>15%"],
      ["fcf_margin",">","r40","Rule of 40>40","rg*100+fcf_margin*100>40"],
    ],
    value:[
      ["pe",">=","<",15,"PE(0~15)"],
      ["fy",">",0.05,"FCF Yield>5%"],
      ["pb","<",1.5,"PB<1.5"],
      ["dy",">",0.02,"股息率>2%"],
      ["dr","<",0.5,"负债率<50%"],
      ["roic",">",0.10,"ROIC>10%"],
    ],
    quality:[
      ["roe",">",0.15,"ROE>15%"],
      ["dr","<",0.5,"负债率<50%"],
      ["gm",">",0.40,"毛利率>40%"],
      ["nm",">",0.15,"净利率>15%"],
      ["roic",">",0.15,"ROIC>15%"],
    ],
    short:[
      ["rg","<",0,"营收下滑"],
      ["gm","<",0.35,"毛利率<35%"],
      ["dr",">",0.65,"负债率>65%"],
      ["nm","<",0.05,"净利率<5%"],
    ],
    special:[["pe",">",50,"PE>50(异常)"]],
  };
  const r=rules[type]||[];
  for(const rule of r){
    const [key,op,threshold,label]=rule;
    const val=vals[key];
    let passed=false;
    if(op===">")passed=val>threshold;
    else if(op==="<")passed=val<threshold;
    else if(op===">="&&rule[2]==="<")passed=val>=0&&val<threshold;
    checks[key]={label,passed,val};
    const wgt=w[key]||1;
    if(passed){total+=100*wgt;weightSum+=wgt;}
  }
  // 加和有weight的评分项
  const totalWeight=Object.values(w).reduce((a,b)=>a+b,0)||1;
  return Math.round(total/totalWeight);
}

      const d=j.data;
      const vals={price:v(d.price),rg:v(d.revenue_growth),pg:v(d.profit_growth),

      // 评分
      const score=_scrScore(type, vals);

      }
      
      results.push({
        sym,name:d.name||sym,vals,score,
        passCount, total:cc.length, checkDetail,
        pct:cc.length>0?Math.round(passCount/cc.length*100):0
      });
    }catch(e){continue}
  }
  
  // 按通过率+评分双排序
  results.sort((a,b)=>{

        <div style="display:flex;gap:8px;align-items:center">
          <span class="s" style="font-size:10px">${typeNames[type]||""}${r.score}分</span>
          <span class="${ec}" style="font-size:18px;font-weight:700">${r.pct}%</span>
        </div>
      </div>
      <div class="progress"><div class="bar" style="width:${r.pct}%;background:${ec==='g'?'#3fb950':ec==='o'?'#d29922':'#f85149'}"></div></div>
      <div class="s" style="font-size:10px;margin-top:2px">${r.passCount}/${r.total}条件通过</div>
      <div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px">`;
    // 展示每个条件的达标状态
    const labelMap={rg:"营收",pg:"利润",gm:"毛利",nm:"净利",pe:"PE",pb:"PB",ps:"PS",
      fy:"FCFY",dy:"股息",dr:"负债",roic:"ROIC",roe:"ROE"};
    for(const c of r.checkDetail){
      const lbl=labelMap[c.key]||c.key;
      const valStr=fmt(c.val,c.key==='pe'||c.key==='pb'||c.key==='ps'?'x':'%');
      html+=`<span class="tg2 ${c.passed?'tgg':'tgr'}" title="${c.key}=${valStr}">${lbl}${c.passed?'✓':'✗'}</span>`;
    }
    // 评分条
    html+=`</div><div class="s" style="font-size:9px;color:#8b949e;margin-top:2px"><span class="${scEc}">${typeNames[type]||""}评分 ${r.score}/100</span></div>`;
    html+=`</div>`;
  }
  html+=`</div>`;
  document.getElementById("scrRes").innerHTML=html;
}

// ===== 树状分支结构渲染 =====
function _renderChainTree(nodes, isChain){
  if(!nodes) return '';
  const keys = Object.keys(nodes);
  if(!keys.length) return '<div class="s">暂无节点</div>';
  
  // Step 1: 分类节点
  const mainNodes={}, branchNodes={}, supportNodes={};
  keys.forEach(k=>{
    const nt = (nodes[k].node_type||'main');
    if(nt==='support') supportNodes[k]=nodes[k];
    else if(nt==='branch') branchNodes[k]=nodes[k];
    else mainNodes[k]=nodes[k];
  });
  
  // 如果没有node_type标记（老数据），全部当main处理
  const hasNodeType = keys.some(k=>nodes[k].node_type);
  
  // Step 2: 找拓扑顺序（BFS）
  function topoSort(nodeSet){
    const ids=Object.keys(nodeSet);
    const indeg={}; ids.forEach(i=>{indeg[i]=0;});
    ids.forEach(i=>{
      const n=nodeSet[i];
      (n.downstream||[]).forEach(d=>{
        if(nodeSet[d]!==undefined) indeg[d]=(indeg[d]||0)+1;
      });
    });
    const q=ids.filter(i=>indeg[i]===0);
    const order=[];
    while(q.length){
      const cur=q.shift();
      order.push(cur);
      (nodeSet[cur].downstream||[]).forEach(d=>{
        if(nodeSet[d]!==undefined){
          indeg[d]--;
          if(indeg[d]===0) q.push(d);
        }
      });
    }
    // 有些节点可能有循环依赖或孤立，补上
    ids.forEach(i=>{if(!order.includes(i)) order.push(i);});
    return order;
  }
  
  const mainOrder = hasNodeType ? topoSort(mainNodes) : keys;
  
  // Step 3: 找每个main节点的branch子节点
  function getChildBranches(parentKey){
    const parent=hasNodeType?mainNodes:null;
    if(!parent||!parent[parentKey]) return [];
    const downstreamIds = parent[parentKey].downstream||[];
    return downstreamIds.filter(did=>branchNodes[did]!==undefined);
  }
  
  // Step 4: 渲染单个节点卡片
  function renderNodeCard(k, n, style=''){
    const isBN=n.bottleneck;
    let borderColor='#30363d', bgColor='#161b22';
    let label='';
    const nt=n.node_type||'main';
    if(nt==='support'){ borderColor='#8b949e'; bgColor='#1c1f26'; label='<span style="color:#8b949e;font-size:9px">🔧配套</span>'; }
    else if(nt==='branch'){ borderColor='#58a6ff'; bgColor='#0d1c2b'; label='<span style="color:#58a6ff;font-size:9px">⊿分支</span>'; }
    if(isBN){ borderColor='#d29922'; bgColor='#1c2333'; }
    const hasComp=(n.companies||[]).length>0;
    const compStr = hasComp ? n.companies.join(' · ') : '<span style="color:#484f58">待补充</span>';
    const bnTag = isBN ? '<div style="color:#d29922;font-size:9px;margin-top:1px">🔴瓶颈</div>' : '';
    const toggleId='tg_'+(k.replace(/[^a-zA-Z0-9]/g,'_'));
    return `<div id="${toggleId}" class="tree-node" data-key="${k}" style="display:inline-block;min-width:110px;max-width:160px;padding:6px 8px;border-radius:6px;text-align:center;font-size:11px;${style}border:0.5px solid ${borderColor};background:${bgColor};cursor:pointer" onclick="_toggleBranch(this,'${k}')">
      ${label}
      <div style="font-weight:500;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n.name||k}</div>
      <div style="color:#8b949e;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${compStr}</div>
      ${bnTag}
    </div>`;
  }
  
  // Step 5: 构建树状HTML
  let h='';
  const mainKeys = hasNodeType ? mainOrder : keys;
  
  // 对每个main节点渲染主链卡片 + 分支卡片
  mainKeys.forEach((k, idx)=>{
    const n = hasNodeType ? mainNodes[k] : nodes[k];
    if(!n) return;
    const branches = getChildBranches(k);
    const isLast = idx === mainKeys.length - 1;
    
    // 主节点卡片
    h += renderNodeCard(k, n);
    
    // 分支卡片（水平展开）
    if(branches.length > 0){
      h += `<div id="br_${k}" class="tree-branches" style="display:${idx<2?'inline-flex':'none'};gap:3px;margin-left:4px;vertical-align:middle;align-items:center">`;
      h += `<span style="color:#30363d;font-size:10px">├</span>`;
      branches.forEach((bk, bi)=>{
        const bn = branchNodes[bk];
        if(!bn) return;
        h += renderNodeCard(bk, bn, '');
        if(bi < branches.length-1) h += `<span style="color:#30363d;font-size:10px">│</span>`;
      });
      // 折叠按钮
      h += `<span style="color:#58a6ff;font-size:9px;cursor:pointer;padding:2px" onclick="event.stopPropagation();_toggleBranchVis('br_${k}',this)" title="展开/收起分支">${idx<2?'▼':'▶'}</span>`;
      h += `</div>`;
    }
    
    // 向下箭头
    if(!isLast) h += `<div style="margin:2px 0 2px 0;text-align:center;color:#30363d;font-size:14px">↓</div>`;
  });
  
  // Step 6: 配套层
  const supportKeys = Object.keys(supportNodes);
  if(supportKeys.length > 0){
    h += `<div style="margin-top:8px;padding:8px 10px;border:0.5px dashed #8b949e;border-radius:6px;background:#0d1117">`;
    h += `<div style="font-size:10px;color:#8b949e;margin-bottom:4px">🔧 配套层（设备/耗材/服务）</div>`;
    h += `<div style="display:flex;flex-wrap:wrap;gap:4px">`;
    supportKeys.forEach(k=>{
      h += renderNodeCard(k, supportNodes[k], '');
    });
    h += `</div></div>`;
  }
  
  // Step 7: 无node_type标记的旧数据，回退到原来的简单展示
  if(!hasNodeType){
    // 保持原有展示，稍作优化
    h = `<div style="display:flex;gap:4px;overflow-x:auto;padding:6px 0;align-items:center;flex-wrap:wrap">`;
    keys.forEach((k,i)=>{
      const n=nodes[k];
      h += renderNodeCard(k, n, '');
      if(i<keys.length-1) h+=`<span style="color:#30363d;font-size:14px;font-weight:300">→</span>`;
    });
    h += `</div>`;
  }
  
  return h;
}

// ===== D3.js 力导向图 =====
function renderForceGraph(containerId, chain){
  const container = document.getElementById(containerId);
  if(!container) return;
  container.innerHTML = '';
  
  const nodes = chain.nodes || {};
  const keys = Object.keys(nodes);
  if(!keys.length) return;
  
  // 构建节点和边
  const graphNodes = keys.map(k => ({
    id: k,
    name: nodes[k].name || k,
    companies: nodes[k].companies || [],
    bottleneck: !!nodes[k].bottleneck,
    bottleneckWeight: nodes[k].bottleneck_weight || 1,
    sensitivity: nodes[k].sensitivity || 1
  }));
  
  const nodeMap = {};
  graphNodes.forEach((n, i) => { nodeMap[n.id] = i; });
  
  const graphLinks = [];
  keys.forEach(k => {
    const n = nodes[k];
    (n.upstream || []).forEach(u => {
      if(nodeMap[u] !== undefined) graphLinks.push({source: k, target: u, type: 'upstream'});
    });
    (n.downstream || []).forEach(d => {
      if(nodeMap[d] !== undefined) graphLinks.push({source: k, target: d, type: 'downstream'});
    });
  });
  
  const width = container.clientWidth || 600;
  const height = 380;
  
  const svg = d3.select(container).append('svg').attr('width', width).attr('height', height);
  const g = svg.append('g');
  
  // 缩放
  svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', (event) => {
    g.attr('transform', event.transform);
  }));
  
  // 力模拟
  const simulation = d3.forceSimulation(graphNodes)
    .force('link', d3.forceLink(graphLinks).id(d => d.id).distance(100))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(d => 30 + (d.bottleneck ? 10 : 0)));
  
  // 箭头
  g.append('defs').selectAll('marker')
    .data(['upstream', 'downstream'])
    .join('marker')
    .attr('id', d => `arrow-${d}`)
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 20)
    .attr('refY', 0)
    .attr('markerWidth', 8)
    .attr('markerHeight', 8)
    .attr('orient', 'auto')
    .append('path')
    .attr('fill', d => d === 'upstream' ? '#58a6ff' : '#3fb950')
    .attr('d', 'M0,-5L10,0L0,5');
  
  // 边
  const link = g.append('g').selectAll('line')
    .data(graphLinks).join('line')
    .attr('stroke', d => d.type === 'upstream' ? '#58a6ff' : '#3fb950')
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.5)
    .attr('marker-end', d => `url(#arrow-${d.type})`);
  
  // 节点组
  const node = g.append('g').selectAll('g')
    .data(graphNodes).join('g')
    .style('cursor', 'grab')
    .call(d3.drag()
      .on('start', (event, d) => { if(!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => { if(!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );
  
  // 节点圆
  node.append('circle')
    .attr('r', d => (d.companies.length || 2) * 3 + 10)
    .attr('fill', d => d.bottleneck ? '#d29922' : '#1f6feb')
    .attr('stroke', d => d.bottleneck ? '#f0ad4e' : '#58a6ff')
    .attr('stroke-width', d => d.bottleneck ? 2.5 : 1.5)
    .attr('opacity', 0.85);
  
  // 瓶颈标志
  node.filter(d => d.bottleneck).append('text')
    .attr('dy', 1).attr('text-anchor', 'middle')
    .attr('fill', '#fff').attr('font-size', '14px').text('‼');
  
  // 节点标签
  node.append('text')
    .attr('dy', d => -(d.companies.length || 2) * 3 - 14)
    .attr('text-anchor', 'middle')
    .attr('fill', '#c9d1d9').attr('font-size', '10px')
    .text(d => d.name.length > 8 ? d.name.slice(0,8)+'…' : d.name);
  
  // 公司标签（小字）
  node.append('text')
    .attr('dy', d => (d.companies.length || 2) * 3 + 18)
    .attr('text-anchor', 'middle')
    .attr('fill', '#8b949e').attr('font-size', '8px')
    .text(d => (d.companies || []).slice(0,3).join(' '));
  
  // Tooltip
  node.append('title')
    .text(d => `${d.name}\n瓶颈权重: ${d.bottleneckWeight}\n敏感度: ${d.sensitivity}\n公司: ${d.companies.join(', ')}`);
  
  // 图例
  const lg = g.append('g').attr('transform', `translate(${width-140}, 10)`);
  lg.append('circle').attr('cx', 0).attr('cy', 0).attr('r', 5).attr('fill', '#1f6feb').attr('opacity', 0.85);
  lg.append('text').attr('x', 10).attr('y', 4).attr('fill', '#8b949e').attr('font-size', '9px').text('普通环节');
  lg.append('circle').attr('cx', 0).attr('cy', 16).attr('r', 5).attr('fill', '#d29922').attr('stroke', '#f0ad4e').attr('stroke-width', 2);
  lg.append('text').attr('x', 10).attr('y', 20).attr('fill', '#d29922').attr('font-size', '9px').text('🟢 瓶颈环节');
  
  // 更新
  simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

async function newsScan() {
  const cid = document.getElementById("newsChain").value;
  const st = document.getElementById("newsStatus");
  st.textContent = "⏳ 扫描新闻中...";
  st.style.color = "#d29922";
  
  try {
    const r = await fetch("/api/news/scan" + (cid ? "?chain_id=" + cid : ""), { signal: AbortSignal.timeout(60000) });
    const j = await r.json();
    if (j.status !== "ok") { st.textContent = "❌ " + (j.msg || "失败"); st.style.color = "#f85149"; return; }
    _newsData = j.data;
    st.textContent = `✅ 扫描完成 · ${_newsData.total || 0}条新闻`;
    st.style.color = "#3fb950";
    newsRender();
  } catch (e) {
    st.textContent = "❌ " + e.message;
    st.style.color = "#f85149";
  }
}

          }
        }
        
        // 受损公司
        if (negTop.length) {
          const maxNeg = Math.max(...negTop.map(([,v])=>Math.abs(v)), 1);
          ph += '<div style="font-size:10px;color:#f85149;margin:6px 0 2px">📉 潜在风险</div>';
          for (const [comp, score] of negTop) {
            const pct = Math.round(Math.abs(score) / maxNeg * 100);
            const conf = pc[comp] !== undefined ? ` · ${Math.round(pc[comp]*100)}%` : '';
            ph += `<div style="display:flex;align-items:center;gap:6px;margin:1px 0">
              <span style="min-width:44px;font-size:10px">${comp}</span>
              <div style="flex:1;height:12px;background:#0d1117;border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:#f85149;border-radius:3px;opacity:0.6"></div>
              </div>
              <span style="min-width:36px;text-align:right;font-size:10px;color:#f85149">${score.toFixed(2)}</span>
              <span style="font-size:8px;color:#8b949e">${conf}</span>
            </div>`;
          }
        }
        
        ph += '</div></div>';
      }
      
      tc.innerHTML = ph;
      tc.innerHTML += '<div style="font-size:10px;color:#8b949e;margin-top:4px">⚡ v8.1 Alpha · 多方向传播 · 时间衰减 · impact_matrix=score · 传播置信度</div>';
    }
  }
  
  // ===== Phase 4+ 共振检测 =====
  if (d.resonance && Object.keys(d.resonance).length) {
    const tf = document.getElementById("newsTimeframe");
    tf.classList.remove("hide");
    const tc = document.getElementById("newsTimeframeContent");
    let rh = '<div style="font-size:13px;font-weight:600;margin:12px 0 6px">🎯 跨链共振机会</div>';
    for (const [comp, info] of Object.entries(d.resonance).slice(0, 5)) {
      const chains = info.chains || [];
      rh += `<div style="background:#1c2333;border:1px solid #d29922;border-radius:6px;padding:8px;margin:4px 0">
        <strong style="font-size:12px;color:#d29922">${comp}</strong>
        <span style="font-size:10px;color:#3fb950;float:right">+${info.total_score}</span>
        <div style="font-size:10px;color:#8b949e;margin-top:3px">${chains.map(c => `${c.chain} +${c.score}`).join(' · ')}</div>
      </div>`;
    }
    tc.innerHTML += rh;
  }
  
  // ===== Phase 4+ 行业轮动 =====
  if (d.rotation && d.rotation.length) {
    const tf = document.getElementById("newsTimeframe");
    tf.classList.remove("hide");
    const tc = document.getElementById("newsTimeframeContent");
    const top = d.rotation.slice(0, 5);
    const maxNet = Math.max(...top.map(r => Math.abs(r.net_score)), 1);
    let roh = '<div style="font-size:13px;font-weight:600;margin:12px 0 6px">🔥 行业轮动（近7天）</div>';
    for (const r of top) {
      const pct = Math.round(Math.abs(r.net_score) / maxNet * 100);
      const isUp = r.trend === "rising";
      roh += `<div style="display:flex;align-items:center;gap:6px;margin:2px 0;padding:4px 6px;background:#161b22;border-radius:4px">
        <span style="font-size:10px;min-width:90px">${isUp ? '↑' : '↓'} ${r.chain_id}</span>
        <div style="flex:1;height:10px;background:#0d1117;border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${isUp?'#3fb950':'#f85149'};border-radius:3px;opacity:0.7"></div>
        </div>
        <span style="font-size:10px;min-width:40px;text-align:right;color:${isUp?'#3fb950':'#f85149'}">${r.net_score > 0 ? '+' : ''}${r.net_score.toFixed(1)}</span>
      </div>`;
    }
    tc.innerHTML += roh;
  }
  
  // ===== Phase 4+ 自动发现候选链 =====
  if (d.candidate_chains && d.candidate_chains.length) {
    const tf = document.getElementById("newsTimeframe");
    tf.classList.remove("hide");
    const tc = document.getElementById("newsTimeframeContent");
    let ch = '<div style="font-size:13px;font-weight:600;margin:12px 0 6px">🔍 自动发现新主题</div>';
    for (const cand of d.candidate_chains) {
      ch += `<div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px;margin:4px 0">
        <strong style="font-size:11px;color:#58a6ff">${cand.seed_stock}</strong>
        <span class="s" style="font-size:9px"> 🔬 实验性 · ${cand.size}只关联</span>
        <div style="font-size:9px;color:#8b949e;margin-top:2px">${(cand.related || []).join(' · ')}</div>
      </div>`;
    }
    tc.innerHTML += ch;
  }
}

function newsAuto() {
  const st = document.getElementById("newsStatus");
  if (_newsTimer) {
    clearInterval(_newsTimer);
    _newsTimer = null;
    st.textContent = "⏹ 已停止定时扫描";
    st.style.color = "#8b949e";
    return;
  }
  st.textContent = "⏰ 定时扫描中 (每30分钟)...";
  st.style.color = "#d29922";
  newsScan();
  _newsTimer = setInterval(() => { newsScan(); }, 30 * 60 * 1000);
  document.querySelectorAll("#t3 .btn2")[1].textContent = "⏹ 停止定时";
}

// 切到Tab3时加载
const _origSw = sw;
sw = function(i, el) {
  _origSw(i, el);
  if (i === 3) { newsLoadChains(); }
};

// 初始加载组合（延迟等页面渲染完）
setTimeout(pfLoad, 800);
</script>
